<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harmonic - Minimal Music Player</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #38bdf8;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Player Container Layout */
        .player-container {
            background: var(--card-bg);
            display: flex;
            width: 760px;
            max-width: 100%;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        /* Main Player Section */
        .main-player {
            flex: 1;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            border-right: 1px solid #334155;
        }

        .track-info {
            text-align: center;
            margin-bottom: 30px;
        }

        .track-art {
            width: 200px;
            height: 200px;
            background-size: cover;
            background-position: center;
            border-radius: 15px;
            margin: 0 auto 20px auto;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            transition: transform 0.3s ease;
        }

        /* Subtle animation when playing */
        .playing .track-art {
            transform: scale(1.03);
        }

        #track-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 5px;
        }

        #track-artist {
            font-size: 1rem;
            color: var(--text-muted);
        }

        /* Progress Bar Styles */
        .progress-container {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 25px;
        }

        .progress-container input[type="range"],
        .volume-container input[type="range"] {
            flex: 1;
            accent-color: var(--accent-color);
            cursor: pointer;
            height: 6px;
            border-radius: 3px;
        }

        /* Control Buttons */
        .controls {
            display: flex;
            align-items: center;
            gap: 30px;
            margin-bottom: 30px;
        }

        .controls button {
            background: none;
            border: none;
            color: var(--text-main);
            font-size: 1.5rem;
            cursor: pointer;
            transition: color 0.2s, transform 0.1s;
        }

        .controls button:hover {
            color: var(--accent-color);
        }

        .controls button:active {
            transform: scale(0.95);
        }

        .controls button.play-pause {
            background: var(--accent-color);
            color: var(--bg-color);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            font-size: 1.4rem;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(56, 189, 248, 0.4);
        }

        .controls button.play-pause:hover {
            color: var(--bg-color);
            transform: scale(1.05);
        }

        /* Volume Layout */
        .volume-container {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-muted);
            max-width: 250px;
        }

        /* Playlist Sidebar (Bonus) */
        .playlist-sidebar {
            width: 300px;
            background: rgba(15, 23, 42, 0.4);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
        }

        .playlist-sidebar h3 {
            margin-bottom: 20px;
            font-size: 1.1rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #playlist-tracks {
            list-style: none;
            overflow-y: auto;
            max-height: 320px;
        }

        #playlist-tracks li {
            padding: 12px 15px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 8px;
            transition: background 0.2s;
            display: flex;
            flex-direction: column;
        }

        #playlist-tracks li:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        #playlist-tracks li.active {
            background: rgba(56, 189, 248, 0.15);
            border-left: 4px solid var(--accent-color);
        }

        #playlist-tracks li .song-name {
            font-weight: 500;
            font-size: 0.95rem;
        }

        #playlist-tracks li .artist-name {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        /* Responsive view for smaller screens */
        @media (max-width: 768px) {
            .player-container {
                flex-direction: column;
                width: 100%;
                max-width: 400px;
            }
            .main-player {
                border-right: none;
                border-bottom: 1px solid #334155;
            }
            .playlist-sidebar {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="player-container">
        <div class="main-player">
            <div class="track-info">
                <div class="track-art" id="track-art"></div>
                <h2 id="track-title">Song Title</h2>
                <h3 id="track-artist">Artist Name</h3>
            </div>

            <div class="progress-container">
                <span id="current-time">0:00</span>
                <input type="range" id="progress-bar" min="0" max="100" value="0">
                <span id="duration">0:00</span>
            </div>

            <div class="controls">
                <button id="prev-btn" title="Previous"><i class="fas fa-step-backward"></i></button>
                <button id="play-btn" class="play-pause" title="Play"><i class="fas fa-play"></i></button>
                <button id="next-btn" title="Next"><i class="fas fa-step-forward"></i></button>
            </div>

            <div class="volume-container">
                <i class="fas fa-volume-down"></i>
                <input type="range" id="volume-slider" min="0" max="100" value="80">
                <i class="fas fa-volume-up"></i>
            </div>
        </div>

        <div class="playlist-sidebar">
            <h3>Up Next</h3>
            <ul id="playlist-tracks">
                </ul>
        </div>
    </div>

    <audio id="audio-player"></audio>

    <script>
        // Sample Track Data
        const trackList = [
            {
                title: "Lost in the City Lights",
                artist: "Cosmo Sheldrake",
                cover: "https://images.unsplash.com/photo-1514525253161-7a46d19cd819?w=500&auto=format&fit=crop&q=60",
                source: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"
            },
            {
                title: "Forest Echoes",
                artist: "Nature Vibe",
                cover: "https://images.unsplash.com/photo-1448375240586-882707db888b?w=500&auto=format&fit=crop&q=60",
                source: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"
            },
            {
                title: "Midnight Drive",
                artist: "Lofi Retro",
                cover: "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=500&auto=format&fit=crop&q=60",
                source: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3"
            }
        ];

        let trackIndex = 0;
        let isPlaying = false;

        // DOM Elements
        const playerContainer = document.querySelector('.player-container');
        const audio = document.getElementById('audio-player');
        const playBtn = document.getElementById('play-btn');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const trackArt = document.getElementById('track-art');
        const trackTitle = document.getElementById('track-title');
        const trackArtist = document.getElementById('track-artist');
        const progressBar = document.getElementById('progress-bar');
        const volumeSlider = document.getElementById('volume-slider');
        const currentTimeEl = document.getElementById('current-time');
        const durationEl = document.getElementById('duration');
        const playlistContainer = document.getElementById('playlist-tracks');

        // Initialize App
        function initPlayer() {
            loadTrack(trackIndex);
            renderPlaylist();
        }

        // Load Track Details
        function loadTrack(index) {
            const track = trackList[index];
            trackTitle.innerText = track.title;
            trackArtist.innerText = track.artist;
            trackArt.style.backgroundImage = `url('${track.cover}')`;
            audio.src = track.source;
            
            // Reset Progress Bar
            progressBar.value = 0;
            
            // Highlight Active Track in Playlist
            updateActivePlaylistItem();
        }

        // Play & Pause Logic
        function togglePlay() {
            if (isPlaying) {
                pauseTrack();
            } else {
                playTrack();
            }
        }

        function playTrack() {
            isPlaying = true;
            playerContainer.classList.add('playing');
            playBtn.innerHTML = '<i class="fas fa-pause"></i>';
            audio.play().catch(error => console.log("Playback interrupted or requires user interaction first."));
        }

        function pauseTrack() {
            isPlaying = false;
            playerContainer.classList.remove('playing');
            playBtn.innerHTML = '<i class="fas fa-play"></i>';
            audio.pause();
        }

        // Skip tracks
        function prevTrack() {
            trackIndex--;
            if (trackIndex < 0) {
                trackIndex = trackList.length - 1;
            }
            loadTrack(trackIndex);
            if (isPlaying) playTrack();
        }

        // Skip tracks
        function nextTrack() {
            trackIndex++;
            if (trackIndex >= trackList.length) {
                trackIndex = 0;
            }
            loadTrack(trackIndex);
            if (isPlaying) playTrack();
        }

        // Time & Progress Update
        function updateProgress() {
            if (audio.duration) {
                const progressPercent = (audio.currentTime / audio.duration) * 100;
                progressBar.value = progressPercent;
                
                // Format Time
                currentTimeEl.innerText = formatTime(audio.currentTime);
                durationEl.innerText = formatTime(audio.duration);
            }
        }

        function setProgress(e) {
            const newTime = (e.target.value / 100) * audio.duration;
            audio.currentTime = newTime;
        }

        function formatTime(seconds) {
            const min = Math.floor(seconds / 60);
            const sec = Math.floor(seconds % 60);
            return `${min}:${sec < 10 ? '0' : ''}${sec}`;
        }

        // Volume Controls
        function handleVolume(e) {
            audio.volume = e.target.value / 100;
        }

        // Playlist Structure
        function renderPlaylist() {
            playlistContainer.innerHTML = '';
            trackList.forEach((track, index) => {
                const li = document.createElement('li');
                li.dataset.index = index;
                li.innerHTML = `
                    <span class="song-name">${track.title}</span>
                    <span class="artist-name">${track.artist}</span>
                `;
                li.addEventListener('click', () => {
                    trackIndex = index;
                    loadTrack(trackIndex);
                    playTrack();
                });
                playlistContainer.appendChild(li);
            });
        }

        function updateActivePlaylistItem() {
            const items = playlistContainer.querySelectorAll('li');
            items.forEach((item, index) => {
                if (index === trackIndex) {
                    item.classList.add('active');
                } else {
                    item.classList.remove('active');
                }
            });
        }

        // Event Listeners
        playBtn.addEventListener('click', togglePlay);
        prevBtn.addEventListener('click', prevTrack);
        nextBtn.addEventListener('click', nextTrack);
        audio.addEventListener('timeupdate', updateProgress);
        audio.addEventListener('loadedmetadata', updateProgress);
        progressBar.addEventListener('input', setProgress);
        volumeSlider.addEventListener('input', handleVolume);

        // Autoplay Feature: Play next song when current finishes
        audio.addEventListener('ended', nextTrack);

        // Boot Application
        initPlayer();
    </script>
</body>
</html>
